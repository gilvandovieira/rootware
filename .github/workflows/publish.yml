name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: Rootware package name to publish, without the @rootware/ scope.
        required: true
        type: string
      dry_run:
        description: Run deno publish --dry-run instead of publishing.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Validate package input
        run: |
          case "${{ inputs.package }}" in
            errors|env|log|testing|http|cache|storage|session|schema|migrate|orm|jobs)
              echo "Publishing package: ${{ inputs.package }}"
              ;;
            *)
              echo "Unsupported package: ${{ inputs.package }}"
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Run CI checks
        run: deno task ci

      - name: Publish package
        run: |
          # Before publishing via GitHub Actions, the JSR package must be
          # created or prepared in JSR and linked to gilvandovieira/rootware
          # in the package settings. This workflow uses OIDC, not JSR_TOKEN.
          case "${{ inputs.package }}" in
            errors|env|log|testing)
              package_path="packages/foundation/${{ inputs.package }}"
              ;;
            schema|migrate|orm)
              package_path="packages/data/${{ inputs.package }}"
              ;;
            http)
              package_path="packages/web/http"
              ;;
            cache|storage|session)
              package_path="packages/state/${{ inputs.package }}"
              ;;
            jobs)
              package_path="packages/async/jobs"
              ;;
          esac
          cd "$package_path"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            deno publish --dry-run
          else
            deno publish
          fi
